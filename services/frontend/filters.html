<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фильтры — HH Parser</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: { 900: '#0f1117', 800: '#1a1d27', 700: '#21263a', 600: '#2d3348' },
                        accent: { 500: '#6366f1', 600: '#4f46e5', 400: '#818cf8' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-dark-900 text-gray-100 min-h-screen">

    <!-- Сайдбар -->
    <aside class="fixed left-0 top-0 h-full w-64 bg-dark-800 border-r border-white border-opacity-5 z-40 flex flex-col">
        <div class="p-6 border-b border-white border-opacity-5">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-accent-500 bg-opacity-20 rounded-xl flex items-center justify-center border border-accent-500 border-opacity-30">
                    <svg class="w-5 h-5 text-accent-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                </div>
                <span class="font-bold text-white">HH Parser</span>
            </div>
        </div>
        <nav class="flex-1 p-4 space-y-1">
            <a href="dashboard.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-400 hover:text-white hover:bg-white hover:bg-opacity-5 transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
                Вакансии
            </a>
            <a href="analytics.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-400 hover:text-white hover:bg-white hover:bg-opacity-5 transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                Аналитика
            </a>
            <a href="filters.html" class="nav-item active flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium bg-accent-500 bg-opacity-15 text-accent-400 border border-accent-500 border-opacity-20">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/></svg>
                Фильтры
            </a>
        </nav>
        <div class="p-4 border-t border-white border-opacity-5">
            <div class="flex items-center gap-3 px-2 py-2">
                <div class="w-8 h-8 bg-accent-500 bg-opacity-30 rounded-full flex items-center justify-center text-accent-400 text-sm font-bold" id="user-avatar">U</div>
                <div class="flex-1 min-w-0">
                    <div class="text-sm font-medium text-white truncate" id="user-name">Загрузка...</div>
                    <div class="text-xs text-gray-500 truncate" id="user-email"></div>
                </div>
                <button onclick="logout()" class="text-gray-500 hover:text-red-400 transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                </button>
            </div>
        </div>
    </aside>

    <main class="ml-64 min-h-screen">
        <header class="sticky top-0 z-30 bg-dark-900 bg-opacity-80 backdrop-blur border-b border-white border-opacity-5 px-8 py-4">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-xl font-bold text-white">Фильтры</h1>
                    <p class="text-sm text-gray-500">Управление параметрами поиска вакансий</p>
                </div>
                <button onclick="openCreateModal()"
                    class="flex items-center gap-2 px-4 py-2 bg-accent-500 hover:bg-accent-600 text-white rounded-xl text-sm font-medium transition-all">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                    </svg>
                    Новый фильтр
                </button>
            </div>
        </header>

        <div class="p-8">
            <div id="filters-list" class="grid grid-cols-2 gap-4"></div>
            <div id="filters-empty" class="hidden text-center py-20">
                <div class="text-6xl mb-4">⚙️</div>
                <h3 class="text-xl font-medium text-white mb-2">Фильтров пока нет</h3>
                <p class="text-gray-500 mb-6">Создай первый фильтр чтобы начать поиск вакансий</p>
                <button onclick="openCreateModal()" class="inline-flex items-center gap-2 px-6 py-3 bg-accent-500 hover:bg-accent-600 text-white rounded-xl font-medium transition-all">
                    Создать фильтр
                </button>
            </div>
        </div>
    </main>

    <!-- Модальное окно создания фильтра -->
    <div id="modal-create" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black bg-opacity-60 backdrop-blur-sm" onclick="closeCreateModal()"></div>
        <div class="relative bg-dark-800 rounded-2xl border border-white border-opacity-10 w-full max-w-lg max-h-[90vh] overflow-y-auto shadow-2xl">
            <div class="sticky top-0 bg-dark-800 px-6 py-4 border-b border-white border-opacity-5 flex items-center justify-between rounded-t-2xl">
                <h2 class="text-lg font-bold text-white">Новый фильтр</h2>
                <button onclick="closeCreateModal()" class="text-gray-500 hover:text-white transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div class="p-6 space-y-5">

                <div>
                    <label class="block text-sm text-gray-400 mb-2">Название фильтра *</label>
                    <input id="f-name" type="text" placeholder="Python Backend"
                        class="w-full bg-dark-700 border border-white border-opacity-10 rounded-xl px-4 py-3 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-accent-500 focus:border-opacity-50 transition-all"/>
                </div>

                <div>
                    <label class="block text-sm text-gray-400 mb-2">Ключевые слова</label>
                    <input id="f-keywords" type="text" placeholder="Python, FastAPI, Django"
                        class="w-full bg-dark-700 border border-white border-opacity-10 rounded-xl px-4 py-3 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-accent-500 focus:border-opacity-50 transition-all"/>
                    <p class="text-xs text-gray-600 mt-1">Через запятую</p>
                </div>

                <div>
                    <label class="block text-sm text-gray-400 mb-2">Исключить слова</label>
                    <input id="f-excluded" type="text" placeholder="QA, 1С, тестировщик"
                        class="w-full bg-dark-700 border border-white border-opacity-10 rounded-xl px-4 py-3 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-accent-500 focus:border-opacity-50 transition-all"/>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">Мин. зарплата</label>
                        <input id="f-salary" type="number" placeholder="100000"
                            class="w-full bg-dark-700 border border-white border-opacity-10 rounded-xl px-4 py-3 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-accent-500 focus:border-opacity-50 transition-all"/>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">Уровень опыта</label>
                        <select id="f-experience"
                            class="w-full bg-dark-700 border border-white border-opacity-10 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-accent-500 focus:border-opacity-50 transition-all">
                            <option value="">Любой</option>
                            <option value="noExperience">Без опыта</option>
                            <option value="between1And3">Junior (1-3 года)</option>
                            <option value="between3And6">Middle (3-6 лет)</option>
                            <option value="moreThan6">Senior (6+ лет)</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">Город</label>
                        <input id="f-location" type="text" placeholder="Москва"
                            class="w-full bg-dark-700 border border-white border-opacity-10 rounded-xl px-4 py-3 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-accent-500 focus:border-opacity-50 transition-all"/>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">Формат работы</label>
                        <select id="f-remote"
                            class="w-full bg-dark-700 border border-white border-opacity-10 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-accent-500 focus:border-opacity-50 transition-all">
                            <option value="false">Любой</option>
                            <option value="true">Только удалённо</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-sm text-gray-400 mb-2">Желаемый стек (для AI)</label>
                    <input id="f-stack" type="text" placeholder="Python, FastAPI, PostgreSQL, Redis"
                        class="w-full bg-dark-700 border border-white border-opacity-10 rounded-xl px-4 py-3 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-accent-500 focus:border-opacity-50 transition-all"/>
                    <p class="text-xs text-gray-600 mt-1">AI сравнит вакансии с этим стеком</p>
                </div>

                <div id="modal-error" class="hidden p-3 bg-red-500 bg-opacity-20 border border-red-500 border-opacity-30 rounded-lg text-red-400 text-sm"></div>

                <button onclick="createFilter()"
                    class="w-full bg-accent-500 hover:bg-accent-600 text-white font-medium py-3 rounded-xl transition-all flex items-center justify-center gap-2">
                    <span id="create-btn-text">Создать фильтр</span>
                    <svg id="create-spinner" class="hidden animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/filters.js"></script>
</body>
</html>
