<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аналитика — HH Parser</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: { 900: '#0f1117', 800: '#1a1d27', 700: '#21263a', 600: '#2d3348' },
                        accent: { 500: '#6366f1', 600: '#4f46e5', 400: '#818cf8' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-dark-900 text-gray-100 min-h-screen">

    <!-- Сайдбар (тот же) -->
    <aside class="fixed left-0 top-0 h-full w-64 bg-dark-800 border-r border-white border-opacity-5 z-40 flex flex-col">
        <div class="p-6 border-b border-white border-opacity-5">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-accent-500 bg-opacity-20 rounded-xl flex items-center justify-center border border-accent-500 border-opacity-30">
                    <svg class="w-5 h-5 text-accent-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                    </svg>
                </div>
                <span class="font-bold text-white">HH Parser</span>
            </div>
        </div>
        <nav class="flex-1 p-4 space-y-1">
            <a href="dashboard.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-400 hover:text-white hover:bg-white hover:bg-opacity-5 transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
                Вакансии
            </a>
            <a href="analytics.html" class="nav-item active flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium bg-accent-500 bg-opacity-15 text-accent-400 border border-accent-500 border-opacity-20">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                Аналитика
            </a>
            <a href="filters.html" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-400 hover:text-white hover:bg-white hover:bg-opacity-5 transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/></svg>
                Фильтры
            </a>
        </nav>
        <div class="p-4 border-t border-white border-opacity-5">
            <div class="flex items-center gap-3 px-2 py-2">
                <div class="w-8 h-8 bg-accent-500 bg-opacity-30 rounded-full flex items-center justify-center text-accent-400 text-sm font-bold" id="user-avatar">U</div>
                <div class="flex-1 min-w-0">
                    <div class="text-sm font-medium text-white truncate" id="user-name">Загрузка...</div>
                    <div class="text-xs text-gray-500 truncate" id="user-email"></div>
                </div>
                <button onclick="logout()" class="text-gray-500 hover:text-red-400 transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                </button>
            </div>
        </div>
    </aside>

    <main class="ml-64 min-h-screen">
        <header class="sticky top-0 z-30 bg-dark-900 bg-opacity-80 backdrop-blur border-b border-white border-opacity-5 px-8 py-4">
            <h1 class="text-xl font-bold text-white">Аналитика</h1>
            <p class="text-sm text-gray-500">Статистика по вакансиям и рынку</p>
        </header>

        <div class="p-8">

            <!-- Метрики -->
            <div class="grid grid-cols-4 gap-4 mb-8">
                <div class="bg-dark-800 rounded-2xl p-5 border border-white border-opacity-5">
                    <div class="text-gray-400 text-sm mb-1">Всего вакансий</div>
                    <div class="text-2xl font-bold text-white" id="a-total">—</div>
                </div>
                <div class="bg-dark-800 rounded-2xl p-5 border border-white border-opacity-5">
                    <div class="text-gray-400 text-sm mb-1">Средний Score</div>
                    <div class="text-2xl font-bold text-accent-400" id="a-score">—</div>
                </div>
                <div class="bg-dark-800 rounded-2xl p-5 border border-white border-opacity-5">
                    <div class="text-gray-400 text-sm mb-1">Указали зарплату</div>
                    <div class="text-2xl font-bold text-green-400" id="a-salary-count">—</div>
                </div>
                <div class="bg-dark-800 rounded-2xl p-5 border border-white border-opacity-5">
                    <div class="text-gray-400 text-sm mb-1">Удалённых</div>
                    <div class="text-2xl font-bold text-blue-400" id="a-remote">—</div>
                </div>
            </div>

            <!-- Графики — ряд 1 -->
            <div class="grid grid-cols-2 gap-6 mb-6">
                <div class="bg-dark-800 rounded-2xl p-6 border border-white border-opacity-5">
                    <h3 class="text-sm font-medium text-gray-400 mb-4 uppercase tracking-wide">Распределение по уровням</h3>
                    <div class="relative h-64">
                        <canvas id="chart-levels"></canvas>
                    </div>
                </div>
                <div class="bg-dark-800 rounded-2xl p-6 border border-white border-opacity-5">
                    <h3 class="text-sm font-medium text-gray-400 mb-4 uppercase tracking-wide">Распределение AI Score</h3>
                    <div class="relative h-64">
                        <canvas id="chart-scores"></canvas>
                    </div>
                </div>
            </div>

            <!-- Графики — ряд 2 -->
            <div class="grid grid-cols-2 gap-6 mb-6">
                <div class="bg-dark-800 rounded-2xl p-6 border border-white border-opacity-5">
                    <h3 class="text-sm font-medium text-gray-400 mb-4 uppercase tracking-wide">Топ технологий</h3>
                    <div class="relative h-72">
                        <canvas id="chart-tech"></canvas>
                    </div>
                </div>
                <div class="bg-dark-800 rounded-2xl p-6 border border-white border-opacity-5">
                    <h3 class="text-sm font-medium text-gray-400 mb-4 uppercase tracking-wide">Зарплаты по уровням (руб.)</h3>
                    <div class="relative h-72">
                        <canvas id="chart-salary"></canvas>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/analytics.js"></script>
</body>
</html>
