name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install linters
        run: |
          pip install ruff mypy

      - name: Run Ruff (linter)
        run: |
          ruff check services/ shared/
          
      - name: Run Ruff (formatter check)
        run: |
          ruff format --check services/ shared/

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build api-gateway
        uses: docker/build-push-action@v5
        with:
          context: ./services/api_gateway
          push: false
          tags: hh-api-gateway:test

      - name: Build parser-service
        uses: docker/build-push-action@v5
        with:
          context: ./services/parser_service
          push: false
          tags: hh-parser:test

      - name: Build ai-analyzer
        uses: docker/build-push-action@v5
        with:
          context: ./services/ai_analyzer
          push: false
          tags: hh-ai-analyzer:test

      - name: Build notifier-service
        uses: docker/build-push-action@v5
        with:
          context: ./services/notifier_service
          push: false
          tags: hh-notifier:test

      - name: Build telegram-bot
        uses: docker/build-push-action@v5
        with:
          context: ./services/telegram_bot
          push: false
          tags: hh-telegram-bot:test

      - name: Build dashboard
        uses: docker/build-push-action@v5
        with:
          context: ./services/dashboard
          push: false
          tags: hh-dashboard:test

  compose-check:
    name: Docker Compose Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env from example
        run: cp .env.example .env

      - name: Validate docker-compose
        run: docker compose config --quiet